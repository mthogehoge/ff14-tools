<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜水艦素材計算機 - FF14 Tools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .portal-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .portal-link:hover {
            color: var(--text-main);
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            text-align: left;
            color: var(--text-dim);
            font-weight: 500;
            padding: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .price-cell,
        .total-cell {
            font-family: 'Outfit', sans-serif;
        }

        .grand-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fbbf24;
            text-align: right;
            margin-bottom: 1.5rem;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>

<body>
    <div id="loading">読み込み中...</div>

    <div class="container">
        <header>
            <h1>⚓ 潜水艦素材計算機</h1>
            <a href="/portal/index.html" class="portal-link">ポータルへ戻る</a>
        </header>

        <div class="layout">
            <aside class="card">
                <div class="control-group">
                    <label>艦種を選択</label>
                    <select id="classSelect"></select>
                </div>

                <div class="checkbox-group" id="partSelector">
                    <label class="checkbox-item"><input type="checkbox" id="hullCheck" checked> 艦体 (Hull)</label>
                    <label class="checkbox-item"><input type="checkbox" id="sternCheck" checked> 艦尾 (Stern)</label>
                    <label class="checkbox-item"><input type="checkbox" id="bowCheck" checked> 艦首 (Bow)</label>
                    <label class="checkbox-item"><input type="checkbox" id="bridgeCheck" checked> 艦橋 (Bridge)</label>
                </div>

                <div class="toggle-switch">
                    <input type="checkbox" id="modifiedToggle">
                    <label for="modifiedToggle">改パーツ (Modified)</label>
                </div>
            </aside>

            <main>
                <div class="card" style="margin-bottom: 2rem;">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <h2 style="margin-top: 0;">中間素材 合計</h2>
                        <div id="intermediateTotal" class="grand-total">0 gil</div>
                    </div>
                    <table id="intermediateTable">
                        <thead>
                            <tr>
                                <th>素材名</th>
                                <th style="text-align: right;">必要数</th>
                                <th style="text-align: right;">単価 (gil)</th>
                                <th style="text-align: right;">合計 (gil)</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <h2 style="margin-top: 0;">末端素材（採集素材）</h2>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div id="rawTotal" class="grand-total" style="margin-bottom: 0;">0 gil</div>
                            <button id="copyRawBtn" class="copy-btn">コピー</button>
                        </div>
                    </div>
                    <table id="rawTable">
                        <thead>
                            <tr>
                                <th>素材名</th>
                                <th style="text-align: right;">必要数</th>
                                <th style="text-align: right;">単価 (gil)</th>
                                <th style="text-align: right;">合計 (gil)</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="data.js"></script>
    <script id="pricesScript" src="prices.js"></script>
    <script src="script.js?v=5"></script>
</body>

</html>
